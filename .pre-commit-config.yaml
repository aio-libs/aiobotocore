---
ci:
  autofix_prs: false
  autoupdate_schedule: quarterly

repos:
# All hooks pinned by full commit SHA rather than tag. Tags are
# mutable; SHAs are not. `pre-commit autoupdate` still bumps these
# on the quarterly `autoupdate_schedule`, and the trailing comment
# shows the corresponding tag for human review.
- repo: 'https://github.com/pre-commit/pre-commit-hooks'
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # frozen: v0.15.20
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/astral-sh/uv-pre-commit
  # yamllint disable-line rule:line-length
  rev: 0.11.26  # 0.11.12
  hooks:
  - id: uv-lock
- repo: https://github.com/adrienverge/yamllint
  # yamllint disable-line rule:line-length
  rev: v1.38.0  # v1.37.1
  hooks:
  - id: yamllint
    args: [--strict]
- repo: https://github.com/rvben/rumdl-pre-commit
  # yamllint disable-line rule:line-length
  rev: v0.2.28  # v0.1.74
  hooks:
  - id: rumdl
- repo: https://github.com/sphinx-contrib/sphinx-lint
  # yamllint disable-line rule:line-length
  rev: v1.0.2  # v1.0.2
  hooks:
  - id: sphinx-lint
- repo: https://github.com/python-jsonschema/check-jsonschema
  # yamllint disable-line rule:line-length
  rev: 0.37.4  # 0.36.1
  hooks:
  - id: check-dependabot
  - id: check-github-workflows
  - id: check-readthedocs
  - id: check-jsonschema
    alias: check-github-workflows-require-timeout
    name: Check GitHub Actions workflow jobs set timeout-minutes
    args:
    - --builtin-schema
    - github-workflows-require-timeout
    files: ^\.github/workflows/[^/]+$
    types:
    - yaml
