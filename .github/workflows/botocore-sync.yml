---
name: Botocore Sync

run-name: "Botocore Sync${{ inputs.botocore_version && format(': {0}', inputs.botocore_version) || '' }}"

permissions: {}

on:
  schedule:
  # Weekly, Monday at 10:00 UTC. Cost: each sync run costs $1-5 (more on
  # port-required bumps); weekly balances "stay current" against budget.
  - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      botocore_version:
        description: >-
          Target botocore version
          (leave empty to auto-detect latest)
        required: false
        type: string
      enable_bump:
        description: >-
          Enable bump path (code changes).
          When false, bumps create a feedback
          issue instead of attempting code changes.
        required: false
        type: boolean
        default: false
      dry_run:
        description: >-
          Analyze only — output results to the
          workflow run log. No branches, PRs, or
          code changes.
        required: false
        type: boolean
        default: false

concurrency:
  group: botocore-sync

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      latest_botocore: >-
        ${{ steps.check.outputs.latest_botocore }}
      current_upper: >-
        ${{ steps.check.outputs.current_upper }}
      current_lower: >-
        ${{ steps.check.outputs.current_lower }}
      last_supported: >-
        ${{ steps.check.outputs.last_supported }}
      needs_update: >-
        ${{ steps.check.outputs.needs_update }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Check for new botocore version
      id: check
      env:
        INPUT_VERSION: ${{ inputs.botocore_version }}
      run: |
        # Get latest botocore version from PyPI
        pypi_latest=$(curl -s https://pypi.org/pypi/botocore/json \
          | python3 -c \
          "import sys,json; \
          print(json.load(sys.stdin)['info']['version'])")

        # Validate manual input if provided
        if [ -n "$INPUT_VERSION" ]; then
          pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          if ! echo "$INPUT_VERSION" | grep -qE "$pattern"; then
            echo "::error::Invalid version format"
            exit 1
          fi
          latest="$INPUT_VERSION"
        else
          latest="$pypi_latest"
        fi
        echo "latest_botocore=$latest" >> "$GITHUB_OUTPUT"
        echo "pypi_latest=$pypi_latest" >> "$GITHUB_OUTPUT"

        # Parse botocore specifier from pyproject.toml and
        # check if target version is already supported.
        # Uses packaging.specifiers for correct handling of
        # <, <=, >=, ==, != operators.
        LATEST="$latest" PYPI_LATEST="$pypi_latest" \
          MANUAL="${INPUT_VERSION:+true}" \
          python3 << 'PYEOF'
        import os, sys
        from packaging.requirements import Requirement
        from packaging.version import Version

        latest = os.environ["LATEST"]
        pypi = os.environ["PYPI_LATEST"]
        manual = os.environ.get("MANUAL") == "true"

        # Parse botocore dependency from pyproject.toml
        text = open("pyproject.toml").read()
        for line in text.splitlines():
            stripped = line.strip().strip(",").strip('"')
            if stripped.startswith("botocore "):
                req = Requirement(stripped)
                break
        spec = req.specifier
        for s in spec:
            if s.operator == ">=":
                lower = str(s.version)
            elif s.operator == "<":
                upper = str(s.version)

        out = os.environ["GITHUB_OUTPUT"]
        with open(out, "a") as f:
            f.write(f"current_lower={lower}\n")
            f.write(f"current_upper={upper}\n")

        # Validate manual input
        if manual:
            if Version(latest) > Version(pypi):
                print(f"::error::{latest} does not exist "
                      f"(latest PyPI release: {pypi})")
                sys.exit(1)
            if Version(latest) < Version(lower):
                print(f"::error::{latest} is older than "
                      f"current lower bound {lower}")
                sys.exit(1)

        # Check if target is already supported
        supported = Version(latest) in spec
        if supported:
            if manual:
                print(f"::error::{latest} is already "
                      f"within supported range ({spec})")
                sys.exit(1)
            print(f"Up to date: {latest} in {spec}")
            needs = "false"
        else:
            print(f"Update needed: {latest} not in {spec}")
            needs = "true"

        # Last supported = highest version in the spec
        uv = Version(upper)
        last = f"{uv.major}.{uv.minor}.{uv.micro - 1}"
        with open(out, "a") as f:
            f.write(f"last_supported={last}\n")
            f.write(f"needs_update={needs}\n")

        # Job summary
        summary = os.environ["GITHUB_STEP_SUMMARY"]
        with open(summary, "a") as f:
            f.write("## Botocore Sync Detection\n")
            f.write("| | Version |\n|-|-|\n")
            f.write(f"| PyPI latest | {pypi} |\n")
            f.write(f"| Target | {latest} |\n")
            f.write(f"| Supported range | {spec} |\n")
            sv = f"**{latest} is supported**"
            nv = f"**{latest} needs update**"
            f.write(f"| Status | "
                    f"{sv if supported else nv} |\n")
        PYEOF

  # Classify the diff with Sonnet before deciding which model to use for the
  # actual sync. The classifier is mechanical (diff-walking + registry lookups)
  # — Sonnet handles it for ~$0.10 per run versus ~$1+ if we ran the same step
  # inside the Opus sync. Outputs `verdict` so `sync` below can pick the model:
  # no-port → Sonnet (cheap), anything else → Opus (full reasoning).
  classify:
    needs: detect
    if: needs.detect.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: claude
    permissions:
      contents: read
      id-token: write
      actions: read
    outputs:
      verdict: ${{ steps.parse.outputs.verdict }}
      summary: ${{ steps.parse.outputs.summary }}
      rationale: ${{ steps.parse.outputs.rationale }}
      affected_files: ${{ steps.affected.outputs.files }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Set up uv + Python
      # yamllint disable-line rule:line-length
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        version: '0.11.7'
        python-version: '3.12'
        enable-cache: auto

    - name: Cache .venv
      # yamllint disable-line rule:line-length
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: .venv
        # yamllint disable-line rule:line-length
        key: venv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock', 'pyproject.toml') }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Cache botocore repo
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: /tmp/botocore
        key: botocore-repo

    - name: Clone or update botocore
      run: |
        if [ -f /tmp/botocore/HEAD ]; then
          git -C /tmp/botocore fetch --tags --prune
        else
          git clone --bare \
            https://github.com/boto/botocore.git \
            /tmp/botocore
        fi

    # Pre-compute the list of aiobotocore source files that mirror botocore
    # files changed in the diff range. Pure bash — no Claude needed. Passes
    # downstream so the sync job's prompt can reference it instead of
    # re-running the same `git diff` + mirror-glob.
    - name: List affected aiobotocore files
      id: affected
      env:
        FROM: ${{ needs.detect.outputs.last_supported }}
        TO: ${{ needs.detect.outputs.latest_botocore }}
      run: |
        files=$(git -C /tmp/botocore diff --name-only \
          "$FROM..$TO" -- 'botocore/**/*.py' 2>/dev/null \
          | sed -E 's|^botocore/|aiobotocore/|' \
          | while read -r f; do [ -f "$f" ] && echo "$f"; done \
          | sort -u | paste -sd ',' -)
        echo "files=$files" >> "$GITHUB_OUTPUT"
        if [ -n "$files" ]; then
          echo "Affected aiobotocore mirrors: $files" \
            >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Read classify prompt
      id: prompt
      env:
        LATEST_BOTOCORE: >-
          ${{ needs.detect.outputs.latest_botocore }}
        LAST_SUPPORTED: >-
          ${{ needs.detect.outputs.last_supported }}
        DRY_RUN: >-
          ${{ inputs.dry_run || 'false' }}
      run: |
        VARS='$LATEST_BOTOCORE $LAST_SUPPORTED $DRY_RUN'
        prompt=$(envsubst "$VARS" < .github/botocore-classify-prompt.md)
        {
          echo 'PROMPT<<PROMPT_EOF'
          echo "$prompt"
          echo 'PROMPT_EOF'
        } >> "$GITHUB_OUTPUT"

    # yamllint disable-line rule:line-length
    - uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009  # v1.0.101
      id: claude
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        # No commits in classify — it's a read-only stage.
        use_commit_signing: false
        display_report: true
        show_full_output: true
        plugin_marketplaces: ./.
        plugins: aiobotocore-bot@aiobotocore
        prompt: ${{ steps.prompt.outputs.PROMPT }}
        # Sonnet for the classifier. The check-async-need skill is largely
        # mechanical (diff-walk + registry lookup); Sonnet matches Opus on
        # this task at ~5× lower output cost.
        claude_args: |
          --dangerously-skip-permissions
          --max-turns 30
          --model sonnet
          --plugin-dir plugins/aiobotocore-bot
        # yamllint disable rule:line-length
        settings: |
          {
            "hooks": {
              "PreToolUse": [{
                "matcher": "Bash",
                "command": "if echo \"$TOOL_INPUT\" | grep -qE '\\b(git commit|git push|gh pr (create|edit|comment|merge|close)|gh issue create)\\b'; then echo 'BLOCKED: classify stage is read-only — no commits, pushes, PRs, or issues. Just write /tmp/classification.json.' >&2; exit 2; fi"
              }]
            }
          }
        # yamllint enable rule:line-length

    - name: Hash test sanity check
      # Only run for dry-run dispatches — for real sync runs the downstream
      # `sync` job runs the same hash tests as part of its prompt. Running
      # them here too would just double the wallclock for no extra signal.
      if: inputs.dry_run == true
      continue-on-error: true
      env:
        TARGET: ${{ needs.detect.outputs.latest_botocore }}
      run: |
        uv pip install "botocore==$TARGET"
        if uv run pytest tests/test_patches.py -x 2>&1 \
            | tee /tmp/hash_tests.log; then
          echo "✅ Hash tests pass against $TARGET" \
            >> "$GITHUB_STEP_SUMMARY"
        else
          {
            echo "❌ Hash tests FAIL against $TARGET — sanity-check the verdict"
            echo ''
            echo '```'
            tail -50 /tmp/hash_tests.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Parse classification
      id: parse
      run: |
        if [ ! -f /tmp/classification.json ]; then
          msg="classify did not write /tmp/classification.json"
          echo "::warning::$msg — defaulting to ambiguous"
          {
            echo "verdict=ambiguous"
            echo "summary=Classifier output missing — see classify-job logs"
            echo 'rationale<<RATIONALE_EOF'
            echo "(classifier did not produce output)"
            echo 'RATIONALE_EOF'
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi
        verdict=$(jq -r '.verdict // "ambiguous"' /tmp/classification.json)
        summary=$(jq -r '.summary // ""' /tmp/classification.json)
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "summary=$summary" >> "$GITHUB_OUTPUT"
        {
          echo 'rationale<<RATIONALE_EOF'
          jq -r '.rationale // "(none)"' /tmp/classification.json
          echo 'RATIONALE_EOF'
        } >> "$GITHUB_OUTPUT"
        {
          echo "## Classification: $verdict"
          echo ""
          echo "$summary"
          echo ""
          echo "<details><summary>Per-function rationale</summary>"
          echo ""
          jq -r '.rationale // "(none)"' /tmp/classification.json
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Usage summary
      if: always()
      continue-on-error: true
      env:
        EXEC_FILE: >-
          ${{ steps.claude.outputs.execution_file }}
      run: python3 .github/usage-summary.py

  sync:
    needs: [detect, classify]
    if: needs.detect.outputs.needs_update == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: claude
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up git credentials
      run: gh auth setup-git
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set up uv + Python
      # yamllint disable-line rule:line-length
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        # Pin uv — see claude.yml comment. Same rate-limit concern.
        version: '0.11.7'
        python-version: '3.12'
        enable-cache: auto

    # Cache .venv directly — setup-uv covers the download cache
    # (wheels) but `uv sync` still walks the lockfile and re-links the
    # venv. Keyed on uv.lock + pyproject.toml so any dep change
    # invalidates.
    - name: Cache .venv
      # yamllint disable-line rule:line-length
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: .venv
        # yamllint disable-line rule:line-length
        key: venv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock', 'pyproject.toml') }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Cache botocore repo
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: /tmp/botocore
        key: botocore-repo

    - name: Clone or update botocore
      run: |
        if [ -f /tmp/botocore/HEAD ]; then
          git -C /tmp/botocore fetch --tags --prune
        else
          git clone --bare \
            https://github.com/boto/botocore.git \
            /tmp/botocore
        fi

    - name: Read prompt
      id: prompt
      env:
        LATEST_BOTOCORE: >-
          ${{ needs.detect.outputs.latest_botocore }}
        CURRENT_UPPER: >-
          ${{ needs.detect.outputs.current_upper }}
        CURRENT_LOWER: >-
          ${{ needs.detect.outputs.current_lower }}
        LAST_SUPPORTED: >-
          ${{ needs.detect.outputs.last_supported }}
        ENABLE_BUMP: >-
          ${{ inputs.enable_bump || 'false' }}
        DRY_RUN: >-
          ${{ inputs.dry_run || 'false' }}
        # Pre-computed by the classify job. Sync's prompt Step 3 short-
        # circuits the classifier when these are non-empty — saves the
        # cost of re-classifying on the Opus side.
        CLASSIFIER_VERDICT: >-
          ${{ needs.classify.outputs.verdict }}
        CLASSIFIER_SUMMARY: >-
          ${{ needs.classify.outputs.summary }}
        CLASSIFIER_RATIONALE: >-
          ${{ needs.classify.outputs.rationale }}
        # Pre-computed by classify (pure bash). Comma-separated list of
        # aiobotocore source files that have a botocore counterpart that
        # changed in the diff range. Empty if no Python source changed.
        AFFECTED_AIOBOTOCORE_FILES: >-
          ${{ needs.classify.outputs.affected_files }}
      # yamllint disable-line rule:line-length
      run: |
        VARS='$LATEST_BOTOCORE $CURRENT_UPPER $CURRENT_LOWER'
        VARS="$VARS"' $LAST_SUPPORTED $ENABLE_BUMP $DRY_RUN'
        VARS="$VARS"' $CLASSIFIER_VERDICT $CLASSIFIER_SUMMARY $CLASSIFIER_RATIONALE'
        VARS="$VARS"' $AFFECTED_AIOBOTOCORE_FILES'
        prompt=$(envsubst "$VARS" < .github/botocore-sync-prompt.md)
        {
          echo 'PROMPT<<PROMPT_EOF'
          echo "$prompt"
          echo 'PROMPT_EOF'
        } >> "$GITHUB_OUTPUT"

    # yamllint disable-line rule:line-length
    - uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009  # v1.0.101
      id: claude
      env:
        CLAUDE_BRANCH: claude/botocore-sync
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        use_commit_signing: true
        display_report: true
        show_full_output: true
        # Register the repo-local plugin so skills (check-async-need,
        # bump-version, open-pr, port-tests, etc.) are discoverable by
        # the Skill tool. See claude.yml for the companion comment on
        # why --plugin-dir is also needed — without both, Skill-tool
        # invocations return "Unknown skill: aiobotocore-bot:*" and the
        # agent falls back to re-reading SKILL.md files (wastes ~2.5K
        # tokens per invocation). Tracked upstream at
        # anthropics/claude-code-action#1145.
        plugin_marketplaces: ./.
        plugins: aiobotocore-bot@aiobotocore
        prompt: ${{ steps.prompt.outputs.PROMPT }}
        # Model is conditional on the classify job's verdict:
        # - no-port → Sonnet (mechanical bump+PR; ~5× cheaper output)
        # - everything else → Opus (real porting work, ambiguity, escalation)
        # When `verdict` is empty (classify failed/skipped) the fallback is
        # Opus, matching the prior single-job behavior.
        claude_args: |
          --dangerously-skip-permissions
          --max-turns 100
          --model ${{ needs.classify.outputs.verdict == 'no-port' && 'sonnet' || 'opus' }}
          --plugin-dir plugins/aiobotocore-bot
        # yamllint disable rule:line-length
        settings: |
          {
            "hooks": {
              "PreToolUse": [{
                "matcher": "Bash",
                "command": "if echo \"$TOOL_INPUT\" | grep -qE '\\bgit commit\\b'; then echo 'BLOCKED: Use mcp__github_file_ops__commit_files instead of git commit. git commit produces unsigned commits which block PR merges.' >&2; exit 2; fi"
              }, {
                "matcher": "Bash",
                "command": "if echo \"$TOOL_INPUT\" | grep -qE '\\bgit push\\b.*(\\bmain\\b|\\bmaster\\b|:main\\b|:master\\b)'; then echo 'BLOCKED: Never push directly to main/master.' >&2; exit 2; fi"
              }]
            }
          }
        # yamllint enable rule:line-length

    - name: Usage summary
      if: always()
      continue-on-error: true
      env:
        EXEC_FILE: >-
          ${{ steps.claude.outputs.execution_file }}
      run: python3 .github/usage-summary.py
