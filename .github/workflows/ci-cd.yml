---
name: CI/CD

permissions: {}

on:
  merge_group:
  push:
    branches:
    - main
    tags:
    - >-
      [0-9]+.[0-9]+.[0-9]+
    - >-
      [0-9]+.[0-9]+.[0-9]+.dev[0-9]+
  pull_request:
    branches:
    - main
    - >-
      [0-9].[0-9]+.[0-9]+
  # Dispatch entry point for publishing a release. ``auto-release-on-merge``
  # calls this with ``-f tag=<version>`` after creating the tag + Release;
  # the publish must come from THIS workflow because PyPI's Trusted
  # Publisher is configured against ``ci-cd.yml`` and reusable workflows
  # are not currently supported (see https://docs.pypi.org/trusted-publishers/troubleshooting/).
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Version to publish to PyPI (e.g. ``3.7.0``). When set, the
          ``pypi-publish`` job runs against the build artifact from
          this run; the test matrix still gates publish.
        required: false
        type: string

env:
  FORCE_COLOR: 1

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  test:
    name: test${{ '' }}  # zizmor: ignore[obfuscation] nest jobs under the same sidebar category
    strategy:
      matrix:
        python-version:
        - >-
          3.10
        - 3.11
        - 3.12
        - 3.13
        - 3.14
        os:
        - ubuntu-24.04
        - ubuntu-24.04-arm
        with-awscrt:
        - false
        no-httpx:
        - false
        experimental:
        - false
        include:
        - python-version: 3.14  # add a no-httpx run
          os: ubuntu-24.04
          with-awscrt: false
          no-httpx: true
          experimental: false
        - python-version: 3.14  # add a with-awscrt run
          os: ubuntu-24.04
          with-awscrt: true
          no-httpx: false
          experimental: false
      fail-fast: false
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      continue-on-error: ${{ matrix.experimental }}
      enable-cache: ${{ github.ref_type == 'tag' && 'false' || 'auto' }}
      with-awscrt: ${{ matrix.with-awscrt }}
      no-httpx: ${{ matrix.no-httpx }}
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  coverage-summary:
    name: Coverage processing
    if: >-
      !cancelled()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    needs:
    - test
    steps:
    - name: Notify Codecov that all coverage reports have been uploaded
      if: >-
        !cancelled()
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
      with:
        fail_ci_if_error: true
        run_command: send-notifications

  zizmor:
    name: 🌈 zizmor
    permissions:
      security-events: write

    uses: zizmorcore/workflow/.github/workflows/reusable-zizmor.yml@3bb5e95068d0f44b6d2f3f7e91379bed1d2f96a8

  check:  # This job does nothing and is only used for the branch protection
    if: always()
    needs:
    - build
    - test
    - zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
      with:
        jobs: ${{ toJSON(needs) }}

  pypi-publish:
    name: Publish Python 🐍 distribution 📦 to PyPI
    # Fires on either:
    #   * tag push of a release tag (manual ``git push origin X.Y.Z``)
    #   * workflow_dispatch with ``tag`` input (automated via
    #     ``auto-release-on-merge.yml`` after a ``Release v...`` PR merges)
    # Both paths use the *same* ``ci-cd.yml`` entry point so PyPI's
    # Trusted Publisher (configured against ``ci-cd.yml``) matches in
    # either case. Inlined here -- not a reusable workflow -- because
    # PyPI Trusted Publishing does not currently support reusable
    # workflows (#1595's first publish failure was caused by exactly
    # that mismatch).
    if: >-
      github.ref_type == 'tag' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    needs:
    - check
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      # yamllint disable-line rule:line-length
      url: https://pypi.org/project/aiobotocore/${{ inputs.tag || github.ref_name }}
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    timeout-minutes: 5
    env:
      VERSION: ${{ inputs.tag || github.ref_name }}
    steps:
    - name: Download distribution 📦
      # yamllint disable-line rule:line-length
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Check if distribution 📦 names match version
      run: |
        test -f "dist/aiobotocore-${VERSION}.tar.gz"
        test -f "dist/aiobotocore-${VERSION}-py3-none-any.whl"
    - name: Publish distribution 📦 to PyPI
      # yamllint disable-line rule:line-length
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
