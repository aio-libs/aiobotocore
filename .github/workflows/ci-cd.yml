---
name: CI/CD

permissions: {}

on:
  merge_group:
  push:
    branches:
    - main
    tags:
    - >-
      [0-9]+.[0-9]+.[0-9]+
    - >-
      [0-9]+.[0-9]+.[0-9]+.dev[0-9]+
  pull_request:
    branches:
    - main
    - >-
      [0-9].[0-9]+.[0-9]+

env:
  FORCE_COLOR: 1

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  test:
    name: test${{ '' }}  # zizmor: ignore[obfuscation] nest jobs under the same sidebar category
    strategy:
      matrix:
        python-version:
        - >-
          3.10
        - 3.11
        - 3.12
        - 3.13
        - 3.14
        os:
        - ubuntu-24.04
        - ubuntu-24.04-arm
        with-awscrt:
        - false
        no-httpx:
        - false
        experimental:
        - false
        include:
        - python-version: 3.14  # add a no-httpx run
          os: ubuntu-24.04
          with-awscrt: false
          no-httpx: true
          experimental: false
        - python-version: 3.14  # add a with-awscrt run
          os: ubuntu-24.04
          with-awscrt: true
          no-httpx: false
          experimental: false
      fail-fast: false
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      continue-on-error: ${{ matrix.experimental }}
      enable-cache: ${{ github.ref_type == 'tag' && 'false' || 'auto' }}
      with-awscrt: ${{ matrix.with-awscrt }}
      no-httpx: ${{ matrix.no-httpx }}
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  coverage-summary:
    name: Coverage processing
    if: >-
      !cancelled()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    needs:
    - test
    steps:
    - name: Notify Codecov that all coverage reports have been uploaded
      if: >-
        !cancelled()
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        fail_ci_if_error: true
        run_command: send-notifications

  zizmor:
    name: 🌈 zizmor
    permissions:
      security-events: write

    uses: zizmorcore/workflow/.github/workflows/reusable-zizmor.yml@3bb5e95068d0f44b6d2f3f7e91379bed1d2f96a8

  test-dist:
    name: Smoke-test ${{ matrix.dist-kind }} dist
    needs:
    - build
    strategy:
      matrix:
        dist-kind: [wheel, sdist]
      fail-fast: false
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
    - name: Download distribution 📦
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        version: '0.11.7'
        python-version: '3.14'
        # Disable cache: this job runs after `actions/download-artifact`
        # pulls a freshly-built dist into the workspace, and the smoke
        # test installs that artifact into a one-shot venv. Caching the
        # uv install/wheel cache here would let a poisoned cache from a
        # prior run influence the install (zizmor cache-poisoning #49)
        # without saving meaningful time on a one-package install.
        enable-cache: false
    # Install the built artifact into a fresh Python with no project source
    # checked out — verifies the dist is self-contained (MANIFEST is correct,
    # all required modules ship, dependencies resolve, ``import aiobotocore``
    # works on a clean env). twine check --strict (in build) covers metadata
    # validity; this complements it with a real install + import test.
    - name: Install ${{ matrix.dist-kind }} and verify import
      env:
        DIST_KIND: ${{ matrix.dist-kind }}
      run: |
        case "$DIST_KIND" in
          wheel) artifact=(dist/*.whl) ;;
          sdist) artifact=(dist/*.tar.gz) ;;
        esac
        uv venv smoke-env
        uv pip install --python smoke-env "${artifact[0]}[httpx]"
        uv run --no-project --python smoke-env python -c \
          "import aiobotocore; print('aiobotocore', aiobotocore.__version__); \
           import aiobotocore.session, aiobotocore.client, aiobotocore.config, \
                  aiobotocore.endpoint, aiobotocore.httpsession, \
                  aiobotocore.httpxsession, aiobotocore.credentials, \
                  aiobotocore.response"

  check:  # This job does nothing and is only used for the branch protection
    if: always()
    needs:
    - build
    - test
    - test-dist
    - zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
      with:
        jobs: ${{ toJSON(needs) }}

  pypi-publish:
    name: Publish Python 🐍 distribution 📦 to PyPI
    if: github.ref_type == 'tag'  # only publish on tag pushes
    needs:
    - check
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/aiobotocore/${{ github.ref_name }}
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    timeout-minutes: 5

    steps:
    - name: Download distribution 📦
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Check if distribution 📦 names match git tag
      run: |
        test -f "dist/aiobotocore-${REF_NAME}.tar.gz"
        test -f "dist/aiobotocore-${REF_NAME}-py3-none-any.whl"
      env:
        REF_NAME: ${{ github.ref_name }}
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
