---
name: Draft Release

run-name: >-
  Draft release${{
    inputs.version && format(': v{0}', inputs.version) || ' (auto-version)'
  }}${{ inputs.dry_run && ' [dry-run]' || '' }}

permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Override version (e.g. 3.8.0). Leave empty to auto-derive
          from PR labels and Conventional-Commit prefixes.
        required: false
        type: string
      dry_run:
        description: >-
          Print the proposed changelog and version, don't open a PR.
        required: false
        type: boolean
        default: false

concurrency:
  group: draft-release

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: claude
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
    # Drafting a release on GitHub requires `Write` repo permission,
    # which is also what `workflow_dispatch` enforces by default — but
    # we make the gate explicit here so it's visible in code and can
    # be tightened (e.g. to `maintain`/`admin`) without GitHub UI
    # changes. Triage/Read users get a clear error instead of a
    # silently-half-run pipeline.
    - name: Verify actor can draft releases
      env:
        GH_TOKEN: ${{ github.token }}
        ACTOR: ${{ github.actor }}
        REPO: ${{ github.repository }}
      run: |
        role=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" \
          --jq '.role_name')
        case "$role" in
          admin|maintain|write)
            echo "Authorized: $ACTOR has role '$role'"
            ;;
          *)
            msg="User '$ACTOR' has role '$role' — release requires admin/maintain/write"
            echo "::error::$msg" >&2
            exit 1
            ;;
        esac

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        # Need full history + tags so the skill can locate the previous
        # release boundary and walk the merge log.
        fetch-depth: 0
        persist-credentials: false

    # Pre-install bun and hand its path to claude-code-action so the
    # action's bundled setup-bun step (which would otherwise resolve a
    # `1.3.6` pin via the GitHub tags API and get 403 rate-limited on
    # the shared installation token) is skipped entirely. Mirrors the
    # claude.yml workflow's pattern.
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
      with:
        bun-version: '1.3.6'

    # Provision uv + Python so the agent can run ``uv run pre-commit
    # run --all`` after writing CHANGES.rst + __init__.py, per the
    # project's CLAUDE.md "Run before committing" rule. Without this
    # the agent's pre-commit step fails with ``uv: command not found``
    # and it tries to commit an unverified change. Mirrors the
    # botocore-sync workflow's setup-uv step.
    - name: Set up uv + Python
      # yamllint disable-line rule:line-length
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        version: '0.11.12'
        python-version: '3.12'
        enable-cache: auto

    - name: Cache .venv
      # yamllint disable-line rule:line-length
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: .venv
        # yamllint disable-line rule:line-length
        key: venv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock', 'pyproject.toml') }}

    # Cache pre-commit's per-hook environments so the agent's
    # ``uv run pre-commit run --all`` doesn't re-clone every hook repo
    # (ruff, yamllint, rumdl, sphinx-lint, check-jsonschema, ...) on
    # each workflow run.
    - name: Cache pre-commit hook envs
      # yamllint disable-line rule:line-length
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: pre-commit-${{ runner.os }}-

    - name: Install dev dependencies (for pre-commit, ruff, etc.)
      run: uv sync --frozen

    - name: Read prompt
      id: prompt
      env:
        VERSION: ${{ inputs.version }}
        DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
      run: |
        prompt=$(envsubst '$VERSION $DRY_RUN' \
          < .github/draft-release-prompt.md)
        {
          echo 'PROMPT<<PROMPT_EOF'
          echo "$prompt"
          echo 'PROMPT_EOF'
        } >> "$GITHUB_OUTPUT"

    # yamllint disable-line rule:line-length
    - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a  # v1.0.165
      id: claude
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        use_commit_signing: true
        display_report: true
        show_full_output: true
        # Hardcoded path matches the location setup-bun installs to on
        # ubuntu-latest. Using `steps.<id>.outputs.bun-path` would be
        # cleaner but requires the setup-bun step to have an `id:`,
        # and we mirror claude.yml here for consistency.
        path_to_bun_executable: /home/runner/.bun/bin/bun
        plugin_marketplaces: ./.
        plugins: aiobotocore-bot@aiobotocore
        prompt: ${{ steps.prompt.outputs.PROMPT }}
        # yamllint disable-line rule:line-length
        claude_args: |
          --dangerously-skip-permissions
          --plugin-dir plugins/aiobotocore-bot
          --model sonnet
        # yamllint disable rule:line-length
        settings: |
          {
            "hooks": {
              "PreToolUse": [{
                "matcher": "Bash",
                "command": "if echo \"$TOOL_INPUT\" | grep -qE '\\b(gh pr (merge|close)|gh issue create|gh issue close)\\b'; then echo 'BLOCKED: draft-release only opens the release PR — no merging, closing, or issue creation.' >&2; exit 2; fi"
              }]
            }
          }
        # yamllint enable rule:line-length
