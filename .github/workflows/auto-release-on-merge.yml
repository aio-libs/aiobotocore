---
name: Auto-release on merge

run-name: >-
  Release: ${{ github.event.pull_request.title }}

permissions: {}

# When a PR titled `Release vX.Y.Z` is merged, create the matching git
# tag and a draft GitHub Release whose body is the PR's changelog
# section. The tag push triggers the existing `pypi-publish` job in
# ci-cd.yml, which uploads the artifact to PyPI.
#
# The Release is created as **draft** so the maintainer can review and
# manually publish in the GitHub UI. Switch to `draft: false` here once
# the flow has been exercised a few times and trust is established.
on:
  pull_request:
    types: [closed]
    branches: [main]

# Serialize so two ``Release v...`` PRs merged back-to-back don't race
# on ``git push origin <tag>`` and ``gh release create``. Extremely
# unlikely in practice but cheap insurance.
concurrency:
  group: auto-release-on-merge

jobs:
  tag-and-release:
    if: >-
      github.event.pull_request.merged &&
      startsWith(github.event.pull_request.title, 'Release v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
        sparse-checkout: aiobotocore/__init__.py
        sparse-checkout-cone-mode: false
        persist-credentials: false

    - name: Extract version from __init__.py
      id: ver
      run: |
        v=$(grep -oP "__version__\s*=\s*['\"]\\K[0-9]+\.[0-9]+\.[0-9]+" \
          aiobotocore/__init__.py)
        if [ -z "$v" ]; then
          echo "::error::Could not parse version from aiobotocore/__init__.py"
          exit 1
        fi
        # Sanity check: PR title's vX.Y.Z must match __init__.py's version.
        title_v=$(echo "$PR_TITLE" \
          | grep -oP 'Release v\K[0-9]+\.[0-9]+\.[0-9]+')
        if [ "$title_v" != "$v" ]; then
          echo "::error::PR title version ($title_v) doesn't match \
            __init__.py version ($v)"
          exit 1
        fi
        echo "version=$v" >> "$GITHUB_OUTPUT"
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}

    - name: Extract changelog section from PR body
      id: notes
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        # The release PR body has a `### Changelog` section followed by
        # other sections. Extract just the changelog up to the next
        # heading. Falls back to the full body if the markers aren't
        # found.
        notes=$(printf '%s' "$PR_BODY" \
          | awk '/^### Changelog$/{flag=1;next}/^### /{flag=0}flag')
        if [ -z "$notes" ]; then
          notes="$PR_BODY"
        fi
        {
          echo 'NOTES<<NOTES_EOF'
          echo "$notes"
          echo 'NOTES_EOF'
        } >> "$GITHUB_OUTPUT"

    # Create the GitHub Release AND the underlying annotated tag in one
    # step via the Releases API. Two reasons to use this action over a
    # raw ``git tag -a`` + ``git push`` + ``gh release create`` sequence:
    #
    # 1. **Tag is signed.** Tags created by GitHub's Releases API are
    #    signed by the web-flow key, the same way commits made via the
    #    REST ``git/commits`` endpoint are. ``git tag -a`` from the
    #    runner produces an unsigned tag (no signing key on the runner)
    #    and the REST ``git/tags`` endpoint explicitly does NOT sign
    #    (GitHub Community discussions #69847, #27016).
    # 2. **One step, one API call** — drops the working-tree checkout,
    #    git config, manual ``gh release create``, and the
    #    ``persist-credentials: true`` requirement.
    #
    # Known caveat: tag-push events triggered by ``GITHUB_TOKEN`` do NOT
    # fire other workflows (GitHub's loop-prevention rule), so this will
    # NOT trigger ``ci-cd.yml``'s ``pypi-publish`` job. Maintainer
    # re-pushes the tag locally to trigger publish, OR we provision a
    # GitHub App and pass its installation token via ``token:`` here in
    # a follow-up. Tracked in the post-merge cleanup issue.
    - name: Create signed tag + GitHub Release (draft)
      # yamllint disable-line rule:line-length
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
      with:
        tag_name: ${{ steps.ver.outputs.version }}
        target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
        name: ${{ steps.ver.outputs.version }}
        body: ${{ steps.notes.outputs.NOTES }}
        draft: true
