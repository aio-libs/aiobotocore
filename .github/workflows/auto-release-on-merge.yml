---
name: Auto-release on merge

run-name: >-
  Release: ${{ github.event.pull_request.title }}

permissions: {}

# When a `Release vX.Y.Z` PR is merged, three jobs run sequentially:
#
# 1. ``tag-and-release`` -- creates the signed annotated tag at the
#    merge commit and a draft GitHub Release whose body is the PR's
#    `### Changelog` section. Uses ``gh release create --target ...``
#    which routes through the Releases API; tags created that way are
#    signed by GitHub's web-flow key (in contrast to ``git tag -a``
#    from the runner, which is unsigned, and the REST ``git/tags``
#    endpoint, which doesn't sign either).
# 2. ``build`` -- calls ``reusable-build.yml`` against the merged
#    commit to produce the wheel + sdist artifact.
# 3. ``publish`` -- calls ``reusable-publish.yml`` to download the
#    artifact and publish to PyPI via OIDC trusted publishing.
#
# Both ``ci-cd.yml`` (on tag push) and this workflow (on release-PR
# merge) call the same ``reusable-publish.yml``, so the PyPI publish
# logic lives in exactly one place. Calling the reusable directly
# from this workflow side-steps GitHub's rule that tag-push events
# triggered by ``GITHUB_TOKEN`` don't fire other workflows -- we don't
# rely on that event to start ``pypi-publish`` because we run it
# inline.
#
# The Release is drafted (``draft: true``) so a maintainer reviews and
# clicks Publish in the GitHub UI. Flip to ``draft: false`` once the
# flow is trusted.
on:
  pull_request:
    types: [closed]
    branches: [main]

# Serialize: two ``Release v...`` merges back-to-back must not race on
# tag creation or Release creation. Extremely unlikely in practice but
# cheap insurance.
concurrency:
  group: auto-release-on-merge

jobs:
  tag-and-release:
    if: >-
      github.event.pull_request.merged &&
      startsWith(github.event.pull_request.title, 'Release v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
        sparse-checkout: aiobotocore/__init__.py
        sparse-checkout-cone-mode: false
        persist-credentials: false

    - name: Extract version from __init__.py
      id: ver
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        v=$(grep -oP "__version__\s*=\s*['\"]\\K[0-9]+\.[0-9]+\.[0-9]+" \
          aiobotocore/__init__.py)
        if [ -z "$v" ]; then
          echo "::error::Could not parse version from aiobotocore/__init__.py"
          exit 1
        fi
        # Sanity check: PR title's vX.Y.Z must match __init__.py's version.
        title_v=$(echo "$PR_TITLE" \
          | grep -oP 'Release v\K[0-9]+\.[0-9]+\.[0-9]+')
        if [ "$title_v" != "$v" ]; then
          echo "::error::PR title version ($title_v) doesn't match \
            __init__.py version ($v)"
          exit 1
        fi
        echo "version=$v" >> "$GITHUB_OUTPUT"

    - name: Extract changelog section from PR body
      id: notes
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        # PR body has a `### Changelog` section. Extract from that
        # heading up to the next `### `. Fall back to the full body
        # if the marker isn't found.
        notes=$(printf '%s' "$PR_BODY" \
          | awk '/^### Changelog$/{flag=1;next}/^### /{flag=0}flag')
        if [ -z "$notes" ]; then
          notes="$PR_BODY"
        fi
        {
          echo 'NOTES<<NOTES_EOF'
          echo "$notes"
          echo 'NOTES_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Create signed tag + GitHub Release (draft)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ steps.ver.outputs.version }}
        MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        NOTES: ${{ steps.notes.outputs.NOTES }}
      # ``gh release create --target <SHA>`` routes through the
      # Releases API, which creates AND signs the tag at the target
      # commit. Plain ``git tag -a`` + ``git push`` from the runner
      # cannot sign (no key on the runner), and the REST ``git/tags``
      # endpoint doesn't sign either (GitHub Community #69847, #27016).
      run: |
        gh release create "$VERSION" \
          --repo "$GITHUB_REPOSITORY" \
          --target "$MERGE_SHA" \
          --title "$VERSION" \
          --notes "$NOTES" \
          --draft

  build:
    needs: [tag-and-release]
    uses: ./.github/workflows/reusable-build.yml

  publish:
    needs: [tag-and-release, build]
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    uses: ./.github/workflows/reusable-publish.yml
    with:
      version: ${{ needs.tag-and-release.outputs.version }}
