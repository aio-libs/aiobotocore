---
name: Reusable test

permissions: {}

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: true
      os:
        type: string
        required: true
      continue-on-error:
        type: boolean
      enable-cache:
        type: string
        required: true
      with-awscrt:
        type: boolean
        required: true
      no-httpx:
        type: boolean
        required: true
    secrets:
      codecov-token:
        required: false

env:
  FORCE_COLOR: 1

jobs:
  test:
    name: Test Python ${{ inputs.python-version }} on ${{ inputs.os }}${{
      inputs.with-awscrt && ' with-awscrt' || '' }}${{
      inputs.no-httpx && ' no-httpx' || '' }}

    runs-on: ${{ inputs.os }}
    continue-on-error: ${{ inputs.continue-on-error }}
    env:
      UV_FROZEN: 1
    timeout-minutes: 5

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
        submodules: true
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        # Pin uv so setup-uv skips the GitHub release-list API lookup
        # that otherwise resolves pyproject.toml's required-version
        # range. See claude.yml for the full reasoning.
        version: '0.11.12'
        python-version: ${{ inputs.python-version }}
        enable-cache: ${{ inputs.enable-cache }}
    # ``setup-uv`` above caches uv's wheel-download cache; this caches
    # the rendered ``.venv`` so ``uv sync`` skips the venv re-link on a
    # hot path. Keyed on lockfile + pyproject so any dep change
    # invalidates; awscrt is part of the key because that path syncs an
    # extra group.
    - name: Cache .venv
      # yamllint disable-line rule:line-length
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: .venv
        # yamllint disable-line rule:line-length
        key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ inputs.with-awscrt && 'awscrt-' || '' }}${{ hashFiles('uv.lock', 'pyproject.toml') }}
    # Cache pre-commit's per-hook environments. Without this, every
    # matrix job re-clones every hook repo (ruff, yamllint, rumdl,
    # sphinx-lint, check-jsonschema, ...) and rebuilds their venvs.
    # Restore-keys lets a partial hit salvage most of the cache when
    # a single hook bumps.
    - name: Cache pre-commit hook envs
      # yamllint disable-line rule:line-length
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: pre-commit-${{ runner.os }}-
    - name: Install awscrt
      if: ${{ inputs.with-awscrt }}
      run: |
        uv sync --group awscrt
    - name: Run pre-commit hooks
      run: |
        uv run make pre-commit
    - name: Run unittests
      if: ${{ ! inputs.no-httpx }}
      env:
        COLOR: 'yes'
      run: |
        uv run --extra=httpx make mototest
    - name: Upload unittest coverage to Codecov
      if: ${{ ! inputs.no-httpx }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
      with:
        files: ./coverage.xml
        # yamllint disable-line rule:line-length
        flags: unittests,os-${{ inputs.os }},python-${{ inputs.python-version }}${{ inputs.with-awscrt && ',with-awscrt' || '' }}
        name: codecov-umbrella
        fail_ci_if_error: true
        verbose: true
    - name: Run unittests without httpx installed
      if: ${{ inputs.no-httpx }}
      env:
        COLOR: 'yes'
        HTTP_BACKEND: 'aiohttp'
      run: |
        # Hard fail if httpx leaked into the default env (e.g. via a transitive
        # dependency): this job must exercise the httpx-absent import fallback,
        # so keep httpx out of default-groups. See the `evals` group.
        uv run python - <<'PY'
        import importlib.util, sys
        if importlib.util.find_spec("httpx") is not None:
            sys.exit("httpx must NOT be installed for the no-httpx run")
        PY
        uv run make mototest
    - name: Upload no-httpx unittest coverage to Codecov
      if: ${{ inputs.no-httpx }}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
      with:
        files: ./coverage.xml
        # yamllint disable-line rule:line-length
        flags: unittests,os-${{ inputs.os }},python-${{ inputs.python-version }}${{ inputs.with-awscrt && ',with-awscrt' || '' }},no-httpx
        name: codecov-umbrella
        fail_ci_if_error: true
        verbose: true
    - name: Run eval common tests
      env:
        COLOR: 'yes'
      run: |
        # Install eval-only deps after the no-httpx unit test path has
        # completed; the evals group pulls in anthropic, which can bring
        # in httpx transitively.
        if ${{ inputs.with-awscrt }}; then
          uv sync --group awscrt --group evals
        else
          uv sync --group evals
        fi
        uv run pytest \
          --cov-append \
          --cov-report= \
          --cov=plugins/aiobotocore-bot/evals \
          --cov=tests \
          tests/evals/test_common.py
        uv run coverage xml
    - name: Upload eval coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
      with:
        files: ./coverage.xml
        # yamllint disable-line rule:line-length
        flags: evals-common,os-${{ inputs.os }},python-${{ inputs.python-version }}${{ inputs.with-awscrt && ',with-awscrt' || '' }}${{ inputs.no-httpx && ',no-httpx' || '' }}
        name: codecov-umbrella
        fail_ci_if_error: true
        verbose: true
