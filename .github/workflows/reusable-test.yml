---
name: Reusable test

permissions: {}

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: true
      os:
        type: string
        required: true
      continue-on-error:
        type: boolean
      enable-cache:
        type: string
        required: true
      with-awscrt:
        type: boolean
        required: true
      no-httpx:
        type: boolean
        required: true
    secrets:
      codecov-token:
        required: false

env:
  FORCE_COLOR: 1

jobs:
  test:
    name: Test Python ${{ inputs.python-version }} on ${{ inputs.os }}${{
      inputs.with-awscrt && ' with-awscrt' || '' }}${{
      inputs.no-httpx && ' no-httpx' || '' }}

    runs-on: ${{ inputs.os }}
    continue-on-error: ${{ inputs.continue-on-error }}
    env:
      UV_FROZEN: 1
    timeout-minutes: 5

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        persist-credentials: false
        submodules: true
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        # Pin uv so setup-uv skips the GitHub release-list API lookup
        # that otherwise resolves pyproject.toml's required-version
        # range. See claude.yml for the full reasoning.
        version: '0.11.12'
        python-version: ${{ inputs.python-version }}
        enable-cache: ${{ inputs.enable-cache }}
    # ``setup-uv`` above caches uv's wheel-download cache; this caches
    # the rendered ``.venv`` so ``uv sync`` skips the venv re-link on a
    # hot path. Keyed on lockfile + pyproject so any dep change
    # invalidates; awscrt is part of the key because that path syncs an
    # extra group.
    - name: Cache .venv
      # yamllint disable-line rule:line-length
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: .venv
        # yamllint disable-line rule:line-length
        key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ inputs.with-awscrt && 'awscrt-' || '' }}${{ hashFiles('uv.lock', 'pyproject.toml') }}
    # Cache pre-commit's per-hook environments. Without this, every
    # matrix job re-clones every hook repo (ruff, yamllint, rumdl,
    # sphinx-lint, check-jsonschema, ...) and rebuilds their venvs.
    # Restore-keys lets a partial hit salvage most of the cache when
    # a single hook bumps.
    - name: Cache pre-commit hook envs
      # yamllint disable-line rule:line-length
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: pre-commit-${{ runner.os }}-
    - name: Install awscrt
      if: ${{ inputs.with-awscrt }}
      run: |
        uv sync --group awscrt
    - name: Run pre-commit hooks
      run: |
        uv run make pre-commit
    - name: Run unittests
      if: ${{ ! inputs.no-httpx }}
      env:
        COLOR: 'yes'
      run: |
        uv run --extra=httpx make mototest
    - name: Run unittests without httpx installed
      if: ${{ inputs.no-httpx }}
      env:
        COLOR: 'yes'
        HTTP_BACKEND: 'aiohttp'
      run: |
        uv run make mototest
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
      with:
        files: ./coverage.xml
        # yamllint disable-line rule:line-length
        flags: unittests,os-${{ inputs.os }},python-${{ inputs.python-version }}${{ inputs.with-awscrt && ',with-awscrt' || '' }}${{ inputs.no-httpx && ',no-httpx' || '' }}  # optional
        name: codecov-umbrella  # optional
        fail_ci_if_error: true  # optional (default = false)
        verbose: true  # optional (default = false)
