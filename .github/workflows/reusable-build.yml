---
name: Reusable build

permissions: {}

on:
  workflow_call:

env:
  FORCE_COLOR: 1

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        # Pin uv so setup-uv skips the GitHub release-list API lookup
        # that otherwise resolves pyproject.toml's required-version
        # range. See claude.yml for the full reasoning.
        version: '0.11.7'
        enable-cache: | # zizmor: ignore[cache-poisoning] cache is disabled when publishing to prevent poisoning
          ${{ github.ref_type == 'tag' && 'false' || 'auto' }}
    - name: Build distribution 📦
      run: uv build
    - name: Check distribution 📦
      run: uvx twine check --strict dist/*
    - name: Upload distribution 📦
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: python-package-distributions
        path: dist/
