---
name: Reusable build

permissions: {}

on:
  workflow_call:

env:
  FORCE_COLOR: 1

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        # Pin uv so setup-uv skips the GitHub release-list API lookup
        # that otherwise resolves pyproject.toml's required-version
        # range. See claude.yml for the full reasoning.
        version: '0.11.12'
        enable-cache: | # zizmor: ignore[cache-poisoning] cache is disabled when publishing to prevent poisoning
          ${{ github.ref_type == 'tag' && 'false' || 'auto' }}
    - name: Build distribution 📦
      run: uv build
    - name: Check distribution 📦
      run: uvx twine check --strict dist/*
    - name: Upload distribution 📦
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: python-package-distributions
        path: dist/
