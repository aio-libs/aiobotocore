---
name: Claude Code

permissions: {}

on:
  pull_request:
    types:
    - opened
    - synchronize
  issue_comment:
    types:
    - created
  pull_request_review_comment:
    types:
    - created
  pull_request_review:
    types:
    - submitted
  issues:
    types:
    - opened
    - assigned

jobs:
  claude:
    # Only trusted authors can trigger @claude interactions.
    # Auto-review on pull_request events is unrestricted.
    # yamllint disable-line rule:line-length
    if: >-
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'),
       github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'),
       github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'),
       github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
       (contains(github.event.issue.body, '@claude') ||
       contains(github.event.issue.title, '@claude')) &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'),
       github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    environment: claude
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
    # yamllint disable-line rule:line-length
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Read prompt
      id: prompt
      # yamllint disable-line rule:line-length
      env:
        REPO: ${{ github.repository }}
        # yamllint disable-line rule:line-length
        PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        # Substitute env vars into prompt
        prompt=$(envsubst < .github/claude-review-prompt.md)
        {
          echo 'PROMPT<<PROMPT_EOF'
          echo "$prompt"
          echo 'PROMPT_EOF'
        } >> "$GITHUB_OUTPUT"

    # yamllint disable-line rule:line-length
    - uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        display_report: true
        show_full_output: true
        prompt: ${{ steps.prompt.outputs.PROMPT }}
        # yamllint disable-line rule:line-length
        plugins: "code-review@anthropics/claude-code-plugins"
        settings: |
          {
            "permissions": {
              "allow": ["*"],
              "deny": []
            }
          }
